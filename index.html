<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R. Ávalos Cerámicos</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>R. ÁVALOS CERÁMICOS</h1>
    <p>Arte en cada pieza</p>
  </header>

  <!-- NAV -->
  <nav class="nav">
    <a href="#">Inicio</a>
    <a href="#productos">Productos</a>
    <a href="#contacto">Contacto</a>
  </nav>

  <!-- PRODUCTOS -->
  <section id="productos">
    <h2>Nuestros Productos</h2>

    <div class="productos">

      <!-- Producto 1 -->
      <div class="card">
        <img src="images/plato.jpg" alt="Plato">
        <h3>Plato artesanal</h3>
        <p>Cerámica sin plomo.</p>
        <a class="btn" href="https://wa.me/524181187377?text=Hola%20quiero%20información%20sobre%20una%20pieza" target="_blank">
          Comprar
        </a>
      </div>

      <!-- Producto 2 -->
      <div class="card">
        <img src="images/florero.jpg" alt="florero">
        <h3>Diseño Estrella</h3>
        <p>Acabado brillante.</p>
        <a class="btn" href="https://wa.me/524181187377?text=Hola%20quiero%20el%20florero%20con%20diseño%20estrella" target="_blank">
          Comprar
        </a>
      </div>

    </div>
  </section>

  <!-- CONTACTO -->
  <section id="contacto">
    <h2>Contacto</h2>
    <p>¿Te interesa una pieza? Contáctanos por WhatsApp</p>
    <a class="btn" href="https://wa.me/524181187377?text=Hola%20quiero%20información%20sobre%20una%20pieza" target="_blank">
      Enviar mensaje
    </a>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 R. Ávalos Cerámicos</p>
  </footer>

</body>
</html>
